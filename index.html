<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Google Search Console verification — replace with your real code -->
    <!-- <meta name="google-site-verification" content="YOUR_REAL_CODE_HERE" /> -->

    <!-- ===== Primary SEO ===== -->
    <title>SEO Reporting & Architecture Audit Service | RankFrame SEO</title>
    <meta
      name="description"
      content="RankFrame SEO delivers monthly SEO reports, keyword ranking tracking, and SEO architecture audits for small businesses. $150/month. No setup fee."
    />
    <meta
      name="keywords"
      content="seo reporting service, monthly seo report, seo architecture audit, keyword ranking report, technical seo service, small business seo, seo audit service"
    />
    <link rel="canonical" href="https://www.rankframeseo.com/" />

    <!-- ===== Open Graph (Facebook / LinkedIn) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.rankframeseo.com/" />
    <meta property="og:title" content="SEO Reporting & Architecture Audit Service | RankFrame SEO" />
    <meta property="og:description" content="Monthly SEO reports, keyword ranking tracking, and SEO architecture audits for small businesses. $150/month. No setup fee." />
    <meta property="og:site_name" content="RankFrame SEO" />
    <meta property="og:image" content="https://www.rankframeseo.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ===== Twitter / X Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SEO Reporting & Architecture Audit | RankFrame SEO" />
    <meta name="twitter:description" content="Monthly SEO reports, keyword ranking tracking, and architecture audits. $150/month for small businesses." />
    <meta name="twitter:image" content="https://www.rankframeseo.com/og-image.png" />

    <!-- ===== JSON-LD Structured Data ===== -->

    <!-- Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RankFrame SEO",
      "url": "https://www.rankframeseo.com",
      "logo": "https://www.rankframeseo.com/favicon.svg",
      "description": "RankFrame SEO provides monthly SEO reporting, keyword ranking tracking, and SEO architecture audits for small businesses.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "English"
      }
    }
    </script>

    <!-- Service + Offer -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "Monthly SEO Reporting & Architecture Audit",
      "provider": {
        "@type": "Organization",
        "name": "RankFrame SEO",
        "url": "https://www.rankframeseo.com"
      },
      "description": "Monthly SEO report covering keyword ranking tracking, full SEO architecture audit, metadata and indexing checks, technical SEO issues, and a 30-day priority roadmap.",
      "serviceType": "SEO Reporting Service",
      "areaServed": "Worldwide",
      "url": "https://www.rankframeseo.com",
      "offers": {
        "@type": "Offer",
        "name": "AI SEO Monthly Plan",
        "price": "150.00",
        "priceCurrency": "USD",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "price": "150.00",
          "priceCurrency": "USD",
          "billingDuration": "P1M",
          "billingIncrement": 1,
          "unitCode": "MON"
        },
        "description": "Monthly SEO architecture audit, keyword ranking report, technical SEO checks, and actionable next steps.",
        "url": "https://www.rankframeseo.com"
      }
    }
    </script>

    <!-- FAQPage (rich snippet eligible) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What happens after I subscribe?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You submit your site details, our AI audit workflow begins, and you receive your first structured SEO review with recommendations."
          }
        },
        {
          "@type": "Question",
          "name": "Is there any setup fee?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. The service is a flat $150 per month with no setup charge."
          }
        },
        {
          "@type": "Question",
          "name": "What is included in the monthly SEO report?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The report includes SEO architecture checks, keyword ranking review, Google-facing framework checks, technical issues, and next-step priorities."
          }
        },
        {
          "@type": "Question",
          "name": "Who is the SEO reporting service best for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It is ideal for small businesses, startup teams, and site owners who want a premium monthly SEO review without the cost of a full agency retainer."
          }
        },
        {
          "@type": "Question",
          "name": "How fast do you review a website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We review core SEO structure, technical issues, indexing signals, and keyword visibility efficiently, then organize the findings into a clean monthly report."
          }
        },
        {
          "@type": "Question",
          "name": "Do you support ecommerce and service websites?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The service is suitable for service businesses, ecommerce sites, and general company websites that need better SEO structure and reporting."
          }
        }
      ]
    }
    </script>

    <!-- WebPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "SEO Reporting & Architecture Audit Service | RankFrame SEO",
      "description": "Monthly SEO reports, keyword ranking tracking, and SEO architecture audits for small businesses. $150/month. No setup fee.",
      "url": "https://www.rankframeseo.com/",
      "publisher": {
        "@type": "Organization",
        "name": "RankFrame SEO"
      }
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
